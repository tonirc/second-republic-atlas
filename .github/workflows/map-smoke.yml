name: Map Smoke Tests

on:
  push:
    branches: [main]
    paths:
      - 'en/**'
      - 'es/**'
      - 'ca/**'
      - 'docs/**'
      - 'data/**'
      - 'tests/**'
      - 'playwright.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/map-smoke.yml'
  pull_request:
    paths:
      - 'en/**'
      - 'es/**'
      - 'ca/**'
      - 'docs/**'
      - 'data/**'
      - 'tests/**'
      - 'playwright.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/map-smoke.yml'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run map smoke tests
        run: npm run test:map-smoke
